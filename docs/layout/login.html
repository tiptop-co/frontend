<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Вход</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF7F2;
    color: #2D2A26;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    width: 100%;
    padding: 32px 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 48px;
  }
  .logo-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #C2703E;
  }
  .logo p {
    font-size: 15px;
    color: #8A857D;
    margin-top: 6px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #2D2A26;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 1.5px solid #EDE8E0;
    border-radius: 12px;
    background: #FFFFFF;
    color: #2D2A26;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: #C2703E;
  }
  .form-group input::placeholder {
    color: #B8B3AB;
  }
  .btn-primary {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    color: #FFFFFF;
    background: #C2703E;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-primary:active {
    opacity: 0.85;
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">🍴</div>
    <h1>TipTop</h1>
    <p>Вход в систему</p>
  </div>
  <form>
    <div class="form-group">
      <label>Email / Логин</label>
      <input type="text" placeholder="anna@tiptop.ru">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" placeholder="••••••••">
    </div>
    <button type="submit" class="btn-primary">Войти</button>
  </form>
</div>
</body>
</html>
