<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Профиль</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF7F2;
    color: #2D2A26;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    background: #FAF7F2;
    z-index: 10;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .content { padding: 0 20px; }
  .user-block {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #FFFFFF;
    border-radius: 14px;
    padding: 20px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 24px;
  }
  .user-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #C2703E;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-name { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .user-role { font-size: 13px; color: #8A857D; }
  .tips-card {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 20px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 24px;
    text-align: center;
    border: 1px solid #5B7C5A;
  }
  .tips-label {
    font-size: 13px;
    color: #8A857D;
    margin-bottom: 4px;
  }
  .tips-amount {
    font-size: 28px;
    font-weight: 700;
    color: #5B7C5A;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #8A857D;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    margin-top: 8px;
  }
  .form-card {
    background: #FFFFFF;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #8A857D;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #EDE8E0;
    border-radius: 10px;
    font-size: 15px;
    color: #2D2A26;
    background: #FAF7F2;
    outline: none;
    font-family: inherit;
  }
  .field input:focus { border-color: #C2703E; }
  .field input[disabled] {
    color: #8A857D;
    background: #F0EDE7;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: #C2703E; color: #fff; }
  .btn-primary:active { opacity: 0.9; }
  .btn-outline {
    background: transparent;
    color: #C2703E;
    border: 2px solid #C2703E;
  }
  .btn-danger-outline {
    background: transparent;
    color: #B84233;
    border: 2px solid #B84233;
    margin-top: 12px;
  }
  .divider {
    height: 1px;
    background: #EDE8E0;
    margin: 20px 0;
  }
  .hint {
    font-size: 12px;
    color: #8A857D;
    margin-top: 6px;
  }
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: #FFFFFF;
    border-top: 1px solid #EDE8E0;
    display: flex;
    justify-content: space-around;
    padding: 8px 0 env(safe-area-inset-bottom, 12px);
    z-index: 20;
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: #8A857D;
    text-decoration: none;
    padding: 4px 12px;
  }
  .tab.active { color: #C2703E; }
  .tab-icon { font-size: 22px; }
</style>
</head>
<body>
<div class="header">
  <h1>Профиль</h1>
</div>

<div class="content">
  <div class="user-block">
    <div class="user-avatar">АС</div>
    <div class="user-info">
      <div class="user-name">Анна Смирнова</div>
      <div class="user-role">Официант · Гастроном</div>
    </div>
  </div>

  <div class="tips-card">
    <div class="tips-label">Чаевые за сегодня</div>
    <div class="tips-amount">1 350 ₽</div>
  </div>

  <div class="section-title">Личные данные</div>
  <div class="form-card">
    <div class="field">
      <label>Имя</label>
      <input type="text" value="Анна">
    </div>
    <div class="field">
      <label>Фамилия</label>
      <input type="text" value="Смирнова">
    </div>
    <div class="field">
      <label>Телефон</label>
      <input type="tel" value="+7 912 345-67-89" disabled>
      <div class="hint">Телефон нельзя изменить. Обратитесь к менеджеру.</div>
    </div>
  </div>

  <div class="section-title">Смена пароля</div>
  <div class="form-card">
    <div class="field">
      <label>Текущий пароль</label>
      <input type="password" placeholder="Введите текущий пароль">
    </div>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" placeholder="Минимум 8 символов">
    </div>
    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" placeholder="Повторите новый пароль">
    </div>
    <div class="hint">При создании аккаунта пароль генерируется автоматически. Рекомендуем сменить его при первом входе.</div>
  </div>

  <button class="btn btn-primary">Сохранить изменения</button>

  <div class="divider"></div>

  <button class="btn btn-danger-outline">Выйти из аккаунта</button>
</div>

<nav class="tab-bar">
  <a class="tab" href="waiter-tables.html">
    <span class="tab-icon">☰</span>
    Столы
  </a>
  <a class="tab" href="waiter-requests.html">
    <span class="tab-icon">🔔</span>
    Заявки
  </a>
  <a class="tab active" href="#">
    <span class="tab-icon">👤</span>
    Профиль
  </a>
</nav>
</body>
</html>
