<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Столы и QR-коды</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF7F2; color: #2D2A26;
    max-width: 430px; margin: 0 auto; min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    padding: 20px 16px 12px; background: #FFFFFF;
    border-bottom: 1px solid #EDE8E0;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    margin: 16px 16px 0; padding: 10px 16px;
    border: 1.5px solid #C2703E; border-radius: 10px;
    background: transparent; color: #C2703E;
    font-size: 15px; font-weight: 600; cursor: pointer;
    width: calc(100% - 32px); justify-content: center;
  }
  .list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: #FFFFFF; border-radius: 12px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 12px;
  }
  .table-num { font-size: 16px; font-weight: 700; min-width: 60px; }
  .status {
    font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
  }
  .status.closed { background: #EDE8E0; color: #999; }
  .status.open { background: rgba(194,112,62,0.12); color: #C2703E; }
  .spacer { flex: 1; }
  .qr-btn {
    background: none; border: 1px solid #EDE8E0; border-radius: 8px;
    padding: 6px 10px; cursor: pointer; font-size: 16px;
  }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #B84233; font-size: 12px; font-weight: 600;
  }
  .del-btn:disabled { color: #ccc; cursor: default; }
  .note { font-size: 11px; color: #999; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: #FFFFFF;
    border-top: 1px solid #EDE8E0; display: flex;
    padding: 6px 0 env(safe-area-inset-bottom, 8px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 6px 0; font-size: 10px; color: #999;
    border: none; background: none; cursor: pointer;
  }
  .tab.active { color: #C2703E; }
  .tab .icon { font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>Столы и QR-коды</h1>
</div>

<button class="add-btn">+ Добавить стол</button>

<div class="list">
  <div class="card">
    <div class="table-num">Стол 1</div>
    <span class="status closed">Закрыт</span>
    <span class="spacer"></span>
    <button class="qr-btn" title="QR-код">&#9783;</button>
    <div class="card-right">
      <button class="del-btn">Удалить</button>
    </div>
  </div>

  <div class="card">
    <div class="table-num">Стол 2</div>
    <span class="status closed">Закрыт</span>
    <span class="spacer"></span>
    <button class="qr-btn" title="QR-код">&#9783;</button>
    <div class="card-right">
      <button class="del-btn">Удалить</button>
    </div>
  </div>

  <div class="card">
    <div class="table-num">Стол 3</div>
    <span class="status open">Открыт</span>
    <span class="spacer"></span>
    <button class="qr-btn" title="QR-код">&#9783;</button>
    <div class="card-right">
      <button class="del-btn" disabled>Удалить</button>
      <span class="note">Есть активные заказы</span>
    </div>
  </div>

  <div class="card">
    <div class="table-num">Стол 5</div>
    <span class="status open">Открыт</span>
    <span class="spacer"></span>
    <button class="qr-btn" title="QR-код">&#9783;</button>
    <div class="card-right">
      <button class="del-btn" disabled>Удалить</button>
      <span class="note">Есть активные заказы</span>
    </div>
  </div>

  <div class="card">
    <div class="table-num">Стол 8</div>
    <span class="status open">Открыт</span>
    <span class="spacer"></span>
    <button class="qr-btn" title="QR-код">&#9783;</button>
    <div class="card-right">
      <button class="del-btn" disabled>Удалить</button>
      <span class="note">Есть активные заказы</span>
    </div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab"><span class="icon">&#127860;</span>Меню</button>
  <button class="tab active"><span class="icon">&#9881;</span>Столы</button>
  <button class="tab"><span class="icon">&#128101;</span>Персонал</button>
  <button class="tab"><span class="icon">&#128200;</span>Статистика</button>
  <button class="tab"><span class="icon">&#8943;</span>Ещё</button>
</nav>

</body>
</html>
