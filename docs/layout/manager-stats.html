<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Статистика</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF7F2; color: #2D2A26;
    max-width: 430px; margin: 0 auto; min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    padding: 20px 16px 12px; background: #FFFFFF;
    border-bottom: 1px solid #EDE8E0;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header .date { font-size: 13px; color: #888; margin-top: 2px; }

  .summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    padding: 16px;
  }
  .stat-card {
    background: #FFFFFF; border-radius: 12px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-label { font-size: 12px; color: #888; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }

  .section { padding: 0 16px 20px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

  .chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
  .bar-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar {
    width: 100%; border-radius: 6px 6px 0 0; background: #C2703E;
    min-height: 4px;
  }
  .bar-label { font-size: 10px; color: #888; }
  .bar-amount { font-size: 9px; color: #666; font-weight: 600; }

  .top-list { display: flex; flex-direction: column; gap: 10px; }
  .top-item {
    background: #FFFFFF; border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; justify-content: space-between; align-items: center;
  }
  .top-rank { font-size: 14px; font-weight: 700; color: #C2703E; margin-right: 10px; min-width: 20px; }
  .top-name { flex: 1; font-size: 14px; font-weight: 500; }
  .top-count { font-size: 13px; color: #888; }

  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: #FFFFFF;
    border-top: 1px solid #EDE8E0; display: flex;
    padding: 6px 0 env(safe-area-inset-bottom, 8px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 6px 0; font-size: 10px; color: #999;
    border: none; background: none; cursor: pointer;
  }
  .tab.active { color: #C2703E; }
  .tab .icon { font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>Статистика</h1>
  <div class="date">Апрель 2026</div>
</div>

<div class="summary">
  <div class="stat-card"><div class="stat-label">Выручка</div><div class="stat-value">247 500 &#8381;</div></div>
  <div class="stat-card"><div class="stat-label">Заказов</div><div class="stat-value">312</div></div>
  <div class="stat-card"><div class="stat-label">Средний чек</div><div class="stat-value">793 &#8381;</div></div>
  <div class="stat-card"><div class="stat-label">Чаевые</div><div class="stat-value">31 200 &#8381;</div></div>
</div>

<div class="section">
  <div class="section-title">По дням</div>
  <div class="chart">
    <div class="bar-wrap"><div class="bar-amount">32k</div><div class="bar" style="height:70%"></div><div class="bar-label">Пн</div></div>
    <div class="bar-wrap"><div class="bar-amount">28k</div><div class="bar" style="height:60%"></div><div class="bar-label">Вт</div></div>
    <div class="bar-wrap"><div class="bar-amount">35k</div><div class="bar" style="height:75%"></div><div class="bar-label">Ср</div></div>
    <div class="bar-wrap"><div class="bar-amount">30k</div><div class="bar" style="height:65%"></div><div class="bar-label">Чт</div></div>
    <div class="bar-wrap"><div class="bar-amount">42k</div><div class="bar" style="height:90%"></div><div class="bar-label">Пт</div></div>
    <div class="bar-wrap"><div class="bar-amount">47k</div><div class="bar" style="height:100%"></div><div class="bar-label">Сб</div></div>
    <div class="bar-wrap"><div class="bar-amount">38k</div><div class="bar" style="height:80%"></div><div class="bar-label">Вс</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Популярные блюда</div>
  <div class="top-list">
    <div class="top-item"><span class="top-rank">1</span><span class="top-name">Цезарь с курицей</span><span class="top-count">87 заказов</span></div>
    <div class="top-item"><span class="top-rank">2</span><span class="top-name">Борщ с говядиной</span><span class="top-count">72 заказа</span></div>
    <div class="top-item"><span class="top-rank">3</span><span class="top-name">Том Ям</span><span class="top-count">65 заказов</span></div>
    <div class="top-item"><span class="top-rank">4</span><span class="top-name">Тирамису</span><span class="top-count">58 заказов</span></div>
    <div class="top-item"><span class="top-rank">5</span><span class="top-name">Морс клюквенный</span><span class="top-count">51 заказ</span></div>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab"><span class="icon">&#127860;</span>Меню</button>
  <button class="tab"><span class="icon">&#9881;</span>Столы</button>
  <button class="tab"><span class="icon">&#128101;</span>Персонал</button>
  <button class="tab active"><span class="icon">&#128200;</span>Статистика</button>
  <button class="tab"><span class="icon">&#8943;</span>Ещё</button>
</nav>

</body>
</html>
