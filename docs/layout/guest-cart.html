<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Корзина</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  max-width: 430px; margin: 0 auto; min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #FAF7F2; color: #2D2A26;
  padding-bottom: 140px;
}
.header { padding: 16px; }
.header h1 { font-size: 22px; font-weight: 700; }

.cart-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
.cart-item {
  background: #fff; border-radius: 14px; padding: 14px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.cart-item-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px;
}
.item-name { font-size: 16px; font-weight: 600; }
.item-price-each { font-size: 13px; color: #888; }
.delete-btn {
  background: none; border: none; color: #B84233; font-size: 18px;
  cursor: pointer; padding: 0 0 0 8px; line-height: 1;
}
.cart-item-bottom {
  display: flex; justify-content: space-between; align-items: center;
}
.qty-controls {
  display: flex; align-items: center; gap: 12px;
}
.qty-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid #EDE8E0;
  background: #fff; font-size: 16px; cursor: pointer; color: #2D2A26;
  display: flex; align-items: center; justify-content: center;
}
.qty-num { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }
.line-total { font-size: 16px; font-weight: 700; color: #C2703E; }

.wishes {
  margin: 20px 16px 0;
}
.wishes textarea {
  width: 100%; min-height: 80px; border: 1px solid #EDE8E0; border-radius: 12px;
  padding: 12px; font-size: 14px; font-family: inherit; background: #fff;
  resize: vertical; color: #2D2A26;
}
.wishes textarea::placeholder { color: #bbb; }

.summary {
  margin: 20px 16px 0; padding: 16px;
  background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  display: flex; justify-content: space-between; align-items: center;
}
.summary-label { font-size: 16px; font-weight: 600; }
.summary-total { font-size: 20px; font-weight: 700; color: #C2703E; }

.order-btn {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  max-width: 398px; width: calc(100% - 32px);
  background: #C2703E; color: #fff; border: none; border-radius: 14px;
  padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer;
  text-align: center; box-shadow: 0 4px 16px rgba(194,112,62,.35); z-index: 20;
}

.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  max-width: 430px; width: 100%; background: #fff;
  border-top: 1px solid #EDE8E0; display: flex;
  padding: 8px 0 env(safe-area-inset-bottom, 8px); z-index: 30;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; font-size: 10px; color: #aaa; text-decoration: none; cursor: pointer;
}
.tab.active { color: #C2703E; }
.tab-icon { font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>Корзина</h1>
</div>

<div class="cart-list">
  <div class="cart-item">
    <div class="cart-item-top">
      <div>
        <div class="item-name">Борщ с говядиной</div>
        <div class="item-price-each">490 ₽ за шт.</div>
      </div>
      <button class="delete-btn">✕</button>
    </div>
    <div class="cart-item-bottom">
      <div class="qty-controls">
        <button class="qty-btn">−</button>
        <span class="qty-num">1</span>
        <button class="qty-btn">+</button>
      </div>
      <span class="line-total">490 ₽</span>
    </div>
  </div>

  <div class="cart-item">
    <div class="cart-item-top">
      <div>
        <div class="item-name">Цезарь с курицей</div>
        <div class="item-price-each">520 ₽ за шт.</div>
      </div>
      <button class="delete-btn">✕</button>
    </div>
    <div class="cart-item-bottom">
      <div class="qty-controls">
        <button class="qty-btn">−</button>
        <span class="qty-num">1</span>
        <button class="qty-btn">+</button>
      </div>
      <span class="line-total">520 ₽</span>
    </div>
  </div>

  <div class="cart-item">
    <div class="cart-item-top">
      <div>
        <div class="item-name">Пельмени домашние</div>
        <div class="item-price-each">460 ₽ за шт.</div>
      </div>
      <button class="delete-btn">✕</button>
    </div>
    <div class="cart-item-bottom">
      <div class="qty-controls">
        <button class="qty-btn">−</button>
        <span class="qty-num">1</span>
        <button class="qty-btn">+</button>
      </div>
      <span class="line-total">460 ₽</span>
    </div>
  </div>
</div>

<div class="wishes">
  <textarea placeholder="Без лука, аллергия на орехи..."></textarea>
</div>

<div class="summary">
  <span class="summary-label">Итого</span>
  <span class="summary-total">1 470 ₽</span>
</div>

<button class="order-btn">Заказать</button>

<nav class="tab-bar">
  <a class="tab"><span class="tab-icon">☰</span>Меню</a>
  <a class="tab active"><span class="tab-icon">🛒</span>Корзина</a>
  <a class="tab"><span class="tab-icon">📋</span>Заказы</a>
  <a class="tab"><span class="tab-icon">🔔</span>Вызов</a>
</nav>

</body>
</html>
