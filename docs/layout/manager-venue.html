<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Заведение</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF7F2; color: #2D2A26;
    max-width: 430px; margin: 0 auto; min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    padding: 20px 16px 12px; background: #FFFFFF;
    border-bottom: 1px solid #EDE8E0;
    display: flex; align-items: center; gap: 12px;
  }
  .back { font-size: 22px; color: #2D2A26; cursor: pointer; background: none; border: none; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .form { padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; padding: 12px 14px; border: 1px solid #EDE8E0; border-radius: 10px;
    font-size: 15px; background: #FFFFFF; color: #2D2A26; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #C2703E; }
  .save-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: #C2703E; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: #FFFFFF;
    border-top: 1px solid #EDE8E0; display: flex;
    padding: 6px 0 env(safe-area-inset-bottom, 8px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 6px 0; font-size: 10px; color: #999;
    border: none; background: none; cursor: pointer;
  }
  .tab.active { color: #C2703E; }
  .tab .icon { font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <button class="back">&#8249;</button>
  <h1>Заведение</h1>
</div>

<div class="form">
  <div class="field">
    <label>Название</label>
    <input type="text" value="Гастроном">
  </div>
  <div class="field">
    <label>Адрес</label>
    <input type="text" value="ул. Пушкина, д. 10">
  </div>
  <div class="field">
    <label>Описание</label>
    <textarea>Уютное кафе с авторской кухней и домашней атмосферой</textarea>
  </div>
  <div class="field">
    <label>Расчётный счёт</label>
    <input type="text" value="40817810099910004312">
  </div>
  <button class="save-btn">Сохранить изменения</button>
</div>

<nav class="tab-bar">
  <button class="tab"><span class="icon">&#127860;</span>Меню</button>
  <button class="tab"><span class="icon">&#9881;</span>Столы</button>
  <button class="tab"><span class="icon">&#128101;</span>Персонал</button>
  <button class="tab"><span class="icon">&#128200;</span>Статистика</button>
  <button class="tab active"><span class="icon">&#8943;</span>Ещё</button>
</nav>

</body>
</html>
