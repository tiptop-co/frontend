<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TipTop — Менеджеры</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    max-width: 430px; margin: 0 auto; min-height: 100vh;
    background: #FAF7F2; color: #2D2A26;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding-bottom: 72px;
  }
  .header {
    background: #fff; padding: 16px 20px; border-bottom: 1px solid #EDE8E0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 20px; font-weight: 700; color: #C2703E; }
  .logo span { color: #2D2A26; }
  .header-title { font-size: 15px; color: #2D2A26; font-weight: 600; }
  .content { padding: 16px 16px; }
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; border: 2px solid #C2703E; border-radius: 12px;
    background: transparent; color: #C2703E; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-bottom: 16px;
  }
  .add-btn:active { background: rgba(194,112,62,0.08); }
  .card {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .card-venue { font-size: 14px; color: #5B7C5A; margin-bottom: 2px; }
  .card-email { font-size: 13px; color: #999; }
  .del-btn {
    flex-shrink: 0; width: 36px; height: 36px; border: none; background: rgba(184,66,51,0.08);
    border-radius: 10px; color: #B84233; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; margin-left: 12px;
  }
  .del-btn:active { background: rgba(184,66,51,0.16); }
  .tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px; background: #fff;
    border-top: 1px solid #EDE8E0; display: flex; padding: 8px 0 env(safe-area-inset-bottom, 8px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; font-size: 11px; color: #999; text-decoration: none; padding: 4px 0;
  }
  .tab.active { color: #C2703E; }
  .tab-icon { font-size: 22px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Tip<span>Top</span></div>
  <div class="header-title">Менеджеры заведений</div>
</div>

<div class="content">
  <button class="add-btn">&#43; Добавить менеджера</button>

  <div class="card">
    <div class="card-info">
      <div class="card-name">Иван Петров</div>
      <div class="card-venue">Гастроном</div>
      <div class="card-email">ivan@gastronom.ru</div>
    </div>
    <button class="del-btn">&#10005;</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-name">Елена Волкова</div>
      <div class="card-venue">Кофейня на Арбате</div>
      <div class="card-email">elena@arbat-coffee.ru</div>
    </div>
    <button class="del-btn">&#10005;</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-name">Дмитрий Соколов</div>
      <div class="card-venue">Пиццерия Маргарита</div>
      <div class="card-email">dmitry@margherita.ru</div>
    </div>
    <button class="del-btn">&#10005;</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-name">Ольга Новикова</div>
      <div class="card-venue">Суши-бар Токио</div>
      <div class="card-email">olga@tokyo-sushi.ru</div>
    </div>
    <button class="del-btn">&#10005;</button>
  </div>
</div>

<nav class="tab-bar">
  <a class="tab active" href="admin-managers.html">
    <span class="tab-icon">&#128101;</span>Менеджеры
  </a>
  <a class="tab" href="admin-stats.html">
    <span class="tab-icon">&#128202;</span>Статистика
  </a>
  <a class="tab" href="#">
    <span class="tab-icon">&#9881;</span>Профиль
  </a>
</nav>

</body>
</html>
